# SLAM Toolbox 

slam_toolbox:
  ros__parameters:
    use_sim_time: false
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI

    mode: mapping

    scan_topic: /scan
    # aligns each new scan to the existing map
    use_scan_matching: true
    use_scan_barycenter: true

    # TF frames
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_queue_size: 10
    transform_timeout: 0.5

    # Map parameters
    resolution: 0.05              # 5cm per cell
    max_laser_range: 3.5
    minimum_time_interval: 0.2
    minimum_travel_distance: 0.01 # allow SLAM to initialize/update after very small motion
    minimum_travel_heading: 0.02

    # Performance tuning for RPi3
    transform_publish_period: 0.10   # 10Hz TF publish rate
    map_update_interval: 1.5         # update map every 1.5s for lower CPU load
    throttle_scans: 2                # process every second scan to avoid scan-matching backlog

    # Loop closure
    do_loop_closing: false
    loop_match_minimum_chain_size: 3
    loop_search_maximum_size: 50.0

    # Correlation parameters
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # Loop closure correlation
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Scan matching
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5

    # Misc
    use_response_expansion: true
    tf_buffer_duration: 30.0
